name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push images
        env:
          IMAGE_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          IMAGE_TAG=$(echo $IMAGE_TAG | tr '[:upper:]' '[:lower:]')
          docker build --target tester -t $IMAGE_TAG-test .
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG-test
          docker push $IMAGE_TAG

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull test image
        run: |
          IMAGE_TAG=$(echo "ghcr.io/${{ github.repository }}:${{ github.sha }}" | tr '[:upper:]' '[:lower:]')
          docker pull $IMAGE_TAG-test
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Run MongoDB
        run: |
          docker network create test-network
          docker run -d --name mongo --network test-network \
            -e MONGO_INITDB_DATABASE=patientdb \
            --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 5 \
            --health-start-period 5s \
            mongo:7.0

      - name: Wait for MongoDB
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' mongo)" = "healthy" ]; do
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run tests
        run: |
          docker run --rm --network test-network \
            -e SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/patientdb \
            ghcr.io/${{ github.repository }}:${{ github.sha }}-test \
            mvn -ntp test

      - name: Cleanup
        if: always()
        run: |
          docker stop mongo || true
          docker rm mongo || true
          docker network rm test-network || true
